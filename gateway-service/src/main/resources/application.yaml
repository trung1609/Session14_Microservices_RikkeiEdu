spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-service
              uri: http://localhost:8080
              predicates:
                - Path=/identity/api/auth/**
              filters:
                - StripPrefix=1
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/product/api/products/**
              filters:
                - StripPrefix=1
                - AuthenticationFilter
server:
  port: 8888

